<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS LIGHT OS - High Visibility Mode</title>
    <style>
        :root {
            --bg-main: #f1f5f9;
            --bg-sidebar: #ffffff;
            --fg-text: #1e293b;
            --topbar-bg: #1e293b;
            --topbar-fg: #f8fafc;
            --border-color: #cbd5e1;
            --card-border: #e2e8f0;
            --slider-trough: #e2e8f0;
        }

        body.dark-mode {
            --bg-main: #0f172a;
            --bg-sidebar: #1e293b;
            --fg-text: #f8fafc;
            --border-color: #334155;
            --card-border: #334155;
            --slider-trough: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica', Arial, sans-serif; }

        body {
            background-color: var(--bg-main);
            color: var(--fg-text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background-color 0.3s;
        }

        header {
            height: 70px;
            background-color: var(--topbar-bg);
            color: var(--topbar-fg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 10;
        }

        header h1 { font-size: 22px; font-weight: bold; }

        .toggle-btn {
            background-color: #334155;
            color: white;
            border: none;
            padding: 8px 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            font-size: 10px;
        }

        main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .left-panel {
            flex: 0.68;
            position: relative;
            padding: 20px;
        }

        .blueprint-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .room {
            position: absolute;
            border: 3px solid var(--fg-text);
            display: flex;
            flex-direction: column;
            padding: 10px;
            transition: all 0.3s;
            z-index: 1;
        }

        .room-title {
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 10px;
            pointer-events: none;
        }

        .device-icons {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 100%;
        }

        /* STILE PORTE */
        .door {
            position: absolute;
            background: #94a3b8;
            border: 1px solid #1e293b;
            z-index: 5; /* Sopra le stanze */
        }

        body.dark-mode .door {
            background: #475569;
            border-color: #94a3b8;
        }

        .right-panel {
            flex: 0.32;
            background-color: var(--bg-sidebar);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .sidebar-title {
            padding: 25px;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 10px 20px;
        }

        .card {
            background-color: var(--bg-sidebar);
            border: 1px solid var(--card-border);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
        }

        .card-label {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: #1e293b;
        }

        /* Posizioni Stanze */
        #bedroom1 { left: 5%;  top: 5%;  width: 30%; height: 35%; background-color: #eff6ff; }
        #bedroom2 { left: 35%; top: 5%;  width: 25%; height: 35%; background-color: #eff6ff; }
        #bath1    { left: 5%;  top: 40%; width: 15%; height: 20%; background-color: #f0f9ff; }
        #utility  { left: 5%;  top: 60%; width: 20%; height: 30%; background-color: #f8fafc; }
        #hall     { left: 20%; top: 40%; width: 30%; height: 20%; background-color: #ffffff; }
        #bath2    { left: 25%; top: 60%; width: 25%; height: 30%; background-color: #f0f9ff; }
        #living   { left: 60%; top: 5%;  width: 35%; height: 45%; background-color: #faf5ff; }
        #kitchen  { left: 60%; top: 50%; width: 35%; height: 40%; background-color: #fff7ed; }
        #entry    { left: 50%; top: 40%; width: 10%; height: 30%; background-color: #f1f5f9; }

        body.dark-mode #bedroom1, body.dark-mode #bedroom2, body.dark-mode #hall { background-color: #1e293b; }
        body.dark-mode #bath1, body.dark-mode #bath2 { background-color: #0f172a; }
        body.dark-mode #utility, body.dark-mode #entry { background-color: #334155; }
        body.dark-mode #living { background-color: #1e1b4b; }
        body.dark-mode #kitchen { background-color: #431407; }

    </style>
</head>
<body>

<header>
    <h1>NEXUS LIGHT | DASHBOARD</h1>
    <button class="toggle-btn" onclick="toggleTheme()">🌓 TOGGLE MODE</button>
</header>

<main>
    <div class="left-panel">
        <div class="blueprint-container" id="blueprint">
            <!-- Stanze -->
            <div class="room" id="bedroom1"><span class="room-title">BEDROOM 1</span><div class="device-icons"><span>💡</span><span>🌡️</span><span>🎵</span><span>🪟</span></div></div>
            <div class="room" id="bedroom2"><span class="room-title">BEDROOM 2</span><div class="device-icons"><span>💡</span><span>🌡️</span><span>🎵</span><span>🪟</span></div></div>
            <div class="room" id="bath1"><span class="room-title">BATH 1</span><div class="device-icons"><span>💡</span><span>🌡️</span><span>🎵</span><span>🪟</span></div></div>
            <div class="room" id="utility"><span class="room-title">UTILITY</span><div class="device-icons"><span>💡</span><span>🌡️</span><span>🎵</span><span>🪟</span></div></div>
            <div class="room" id="hall"><span class="room-title">HALL</span><div class="device-icons"><span>💡</span><span>🌡️</span><span>🎵</span><span>🪟</span></div></div>
            <div class="room" id="bath2"><span class="room-title">BATH 2</span><div class="device-icons"><span>💡</span><span>🌡️</span><span>🎵</span><span>🪟</span></div></div>
            <div class="room" id="living"><span class="room-title">LIVING</span><div class="device-icons"><span>💡</span><span>🌡️</span><span>🎵</span><span>🪟</span></div></div>
            <div class="room" id="kitchen"><span class="room-title">KITCHEN</span><div class="device-icons"><span>💡</span><span>🌡️</span><span>🎵</span><span>🪟</span></div></div>
            <div class="room" id="entry"><span class="room-title">ENTRY</span><div class="device-icons"><span>💡</span><span>🌡️</span><span>🎵</span><span>🪟</span></div></div>

            <!-- PORTE (Inserite qui per funzionare correttamente) -->
            <div class="door" style="left: 33.5%; top: 15%; width: 3%; height: 10%;"></div> <!-- Bed1 -> Bed2 -->
            <div class="door" style="left: 58.5%; top: 15%; width: 3%; height: 10%;"></div> <!-- Bed2 -> Living -->
            <div class="door" style="left: 58.5%; top: 70%; width: 3%; height: 10%;"></div> <!-- Entry -> Kitchen -->
            <div class="door" style="left: 10%; top: 38.5%; width: 8%; height: 3%;"></div> <!-- Bed1 -> Bath1 -->
            <div class="door" style="left: 25%; top: 38.5%; width: 8%; height: 3%;"></div> <!-- Bed1 -> Hall -->
            <div class="door" style="left: 40%; top: 38.5%; width: 8%; height: 3%;"></div> <!-- Bed2 -> Hall -->
            <div class="door" style="left: 10%; top: 58.5%; width: 8%; height: 3%;"></div> <!-- Bath1 -> Utility -->
            <div class="door" style="left: 30%; top: 58.5%; width: 8%; height: 3%;"></div> <!-- Hall -> Bath2 -->
            <div class="door" style="left: 75%; top: 48.5%; width: 8%; height: 3%;"></div> <!-- Living -> Kitchen -->
            <div class="door" style="left: 51%; top: 38.5%; width: 8%; height: 3%;"></div> <!-- Hall -> Entry -->
        </div>
    </div>

    <div class="right-panel">
        <div class="sidebar-title">PARAMETERS</div>
        <div class="scroll-area" id="sidebar-content"></div>
    </div>
</main>

<script>
    const rooms = ["BEDROOM 1", "BEDROOM 2", "BATH 1", "UTILITY", "HALL", "BATH 2", "LIVING", "KITCHEN", "ENTRY"];
    const icons = [ {s: "💡", n: "Light"}, {s: "🌡️", n: "Temp"}, {s: "🎵", n: "Audio"}, {s: "🪟", n: "Shade"} ];
    
    const sidebar = document.getElementById('sidebar-content');
    rooms.forEach(room => {
        icons.forEach(icon => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <span class="card-label">${icon.s} ${room}</span>
                <input type="range" min="0" max="100" value="50">
            `;
            sidebar.appendChild(card);
        });
    });

    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
    }
</script>

</body>
</html>
